name: Release

# Build the native game for macOS (Apple Silicon) + Windows (x64) and attach the builds to the
# release for the tag. Fires on a version tag (v0.1.0, …); can also be run by hand for a tag that
# already exists (e.g. to backfill a platform onto a release cut manually).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build + attach assets to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write # create / update the release, upload assets

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon
            platform: macos-aarch64
          - os: windows-latest
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --bin wriftheart --features bevy/debug # TEMP: name systems in panics (death-crash hunt) - drop when caught

      - name: Compute version (tag without leading v)
        id: ver
        shell: bash
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Package — macOS .app.tar.gz
        if: runner.os == 'macOS'
        run: |
          bash packaging/macos-app.sh target/release/wriftheart "${{ steps.ver.outputs.version }}" build
          mkdir -p dist
          tar -czf "dist/WriftHeart-macos-aarch64.app.tar.gz" -C build WriftHeart.app

      - name: Package — Windows .zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\wriftheart.exe WriftHeart.exe
          Compress-Archive -Path WriftHeart.exe -DestinationPath dist\WriftHeart-windows-x86_64.zip -Force

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*
          fail_on_unmatched_files: true
